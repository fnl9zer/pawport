<!DOCTYPE html>
<html>
<head><title>Properties - PawPort</title></head>
<body>
    <h1>Browse Properties</h1>
    <form method="get">
        <input type="text" name="state" placeholder="Search by state" value="{{ query }}">
        <button type="submit">Search</button>
    </form>
    {% for p in properties %}
        <div>
            <h2>{{ p.title }}</h2>
            <p>{{ p.address }}, {{ p.state }}</p>
            <p>RM{{ p.monthly_rent }}/month</p>
            <a href="/properties/{{ p.pk }}/">View Details</a>
        </div>
        <hr>
    {% empty %}
        <p>No properties found.</p>
    {% endfor %}
</body>
</html>
