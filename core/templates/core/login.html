{%load static %}
<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        @font-face {
            font-family: 'PeaceSans';
            src: url("{% static 'core/Peace_Sans_Webfont.ttf' %}") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PeaceSans', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color:#f3c357;
            border-radius: 24px;
            border: 3px solid #f57220;
            padding: 40px 50px 50px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 20px;
        }

        .cat-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .title {
            font-family: 'PeaceSans', sans-serif;
            font-size: 52px;
            color:#f57220;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-field {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2.5px solid #f57220;
            background-color: #f3c357;
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 16px;
            color: #f57220;
            outline: none;
        }

        .input-field::placeholder {
            color: #f57220;
            opacity: 0.8;
        }
 
        .input-field:focus {
            background-color: #f3c357;
        }
 
        .forgot {
            font-family: 'PeaceSans', Arial, sans-serif;
            color: #f57220;
            font-size: 13px;
            text-align: center;
            text-decoration: underline;
            cursor: pointer;
        }
 
        .forgot:hover {
            color: #f57220;
        }
 
        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background-color: #f57220;
            color: white;
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 18px;
            cursor: pointer;
            margin-top: 4px;
            transition: background-color 0.2s;
        }
 
        .btn-primary:hover {
            background-color: #f57220;
        }
 
        .bottom-text {
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 13px;
            color: #f57220;
            text-align: center;
            margin-top: 4px;
        }
 
        .bottom-text a {
            color: #f57220;
            font-weight: bold;
            text-decoration: underline;
        }
 
        .error-list {
            background-color: #ff6b6b;
            color: white;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            width: 100%;
            list-style: none;
        }
 
        /* Mobile */
        @media (max-width: 480px) {
            .card {
                padding: 30px 24px 40px;
                margin: 16px;
            }
 
            .title {
                font-size: 40px;
            }
 
            .cat-icon {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'core/cat.png' %}" alt="PawPort cat" class="cat-icon">
        <h1 class="title">LOGIN</h1>
 
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <ul class="error-list">
                    <li>Invalid username or password. Please try again.</li>
                </ul>
            {% endif %}
            <input type="text" name="username" placeholder="Username" class="input-field" required autofocus>
            <input type="password" name="password" placeholder="Password" class="input-field" required>
            <a href="/forgot-password/" class="forgot">forgot your password?</a>
            <button type="submit" class="btn-primary">Login</button>
        </form>
 
        <p class="bottom-text">Don't have an account? <a href="/register/">Register here</a></p>
    </div>
</body>
</html>
