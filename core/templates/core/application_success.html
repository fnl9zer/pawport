{% load static %}
<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial scale=1.0">
    <title>APPLICATION SUBMITTED SUCCESSFULLY!</title>
    <style>
        @font-face {
            font-family: 'PeaceSans';
            src: url("{% static 'core/Peace_Sans_Webfont.ttf' %}") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PeaceSans', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background-color:#f3c357;
            border-radius: 24px;
            border: 6px solid #f57220;
            padding: 40px 50px 11px;
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cat-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        .title {
            font-family: 'PeaceSans', sans-serif;
            font-size: 52px;
            color:#f57220;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .success-box {
            width: 100%;
            background-color:#f3c357;
            border-radius: 16px;
            padding: 20px 24px;
            border: 2px #f57220;
            text-align: center;
        }

        .success-box h2 {
        font-family: 'PeaceSans', sans-serif;
        font-size: 22px;
        color: #f57220;
        margin-bottom: 12px;
        letter-spacing: 1px;
        }

        .success-box p {
            font-family: 'PeaceSans', sans-serif;
            font-size: 15px;
            color: #f57220;
            line-height: 1;
            opacity: 0.9;
        }

        .btn-primary {
            width: 40%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background-color: #f57220;
            color: white;
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 18px;
            cursor: pointer;
            margin-top: 4px;
            transition: background-color 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary:hover {
            background-color: #e06518;
        }

    /* Mobile */
    @media (max-width: 480px) {
        .card {
            padding: 30px 24px 40px;
            margin: 16px;
        }

        .title {
            font-size: 40px;
        }

        .cat-icon {
            width: 70px;
            height: 70px;
        }
    }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'core/cat.png' %}" alt="PawPort" class="cat-icon">
        <div class="success-box">
            <h2>APPLICATION SUBMITTED SUCCESSFULLY!</h2>
            <p>Your application  has been sent. The Owner will review your cat's profile and get back to you.</p>
        </div>
        <a href="/browse/" class="btn-primary">Browse more listings</a>
    </div>
</body>
</html>
