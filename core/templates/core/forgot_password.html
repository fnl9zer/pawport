{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password</title>
    <style>
        @font-face {
            font-family: 'PeaceSans';
            src: url("{% static 'core/Peace_Sans_Webfont.ttf' %}") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PeaceSans', Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background-color: #f3c357;
            border-radius: 24px;
            border: 3px solid #f57220;
            padding: 50px 50px 60px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin: 20px;
        }

        .title {
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 52px;
            color: #f57220;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.1;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-field {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2.5px solid #f57220;
            background-color: #ffffff;
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 16px;
            color: #f57220;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-field::placeholder {
            color: #f57220;
            opacity: 0.6;
        }

        .input-field:focus {
            background-color: #fff8ee;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background-color: #f57220;
            color: #ffffff;
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #d4601a;
        }

        .back-link {
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 13px;
            color: #f57220;
            text-decoration: underline;
            cursor: pointer;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .success-text {
            font-family: 'PeaceSans', Arial, sans-serif;
            font-size: 16px;
            color: #f57220;
            text-align: center;
            line-height: 1.6;
        }

        /* Popup styles */
        #popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #popup .popup-card {
            background-color: #f3c357;
            border-radius: 24px;
            border: 6px solid #f57220;
            padding: 40px 50px 50px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 20px;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #popup .popup-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 4px;
        }

        #popup .popup-box {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px 24px;
            text-align: center;
        }

        #popup .popup-card h2 {
            font-family: 'PeaceSans', sans-serif;
            font-size: 22px;
            color: #f57220;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-align: center;
        }

        #popup .popup-card p {
            font-family: 'PeaceSans', sans-serif;
            font-size: 15px;
            color: #f57220;
            line-height: 1.6;
            opacity: 0.9;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 24px 40px;
                margin: 16px;
            }

            .title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">RECOVER<br>PASSWORD</h1>

        {% if sent %}
        <div id="popup">
            <div class="popup-card">
                <h2>RECOVERY EMAIL SENT!</h2>
                <p>Please check your inbox and follow the instructions to reset your password.</p>
                <a href="/login/" style="width:100%; padding:18px; border-radius:50px; border:none; background-color:#f57220; color:#ffffff; font-family:'PeaceSans',Arial,sans-serif; font-size:18px; cursor:pointer; text-decoration:none; text-align:center; display:block;">Back to login</a>
            </div>
        </div>
        {% else %}
            <form method="post">
                {% csrf_token %}
                <input type="email" name="email" placeholder="E-mail" class="input-field" required>
                <button type="submit" class="btn-primary">Recover</button>
            </form>
            <a href="/login/" class="back-link">Back to login</a>
        {% endif %}
    </div>
</body>
</html>
